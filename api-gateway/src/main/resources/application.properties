spring.application.name=api-gateway
server.port=8080
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false
spring.cloud.config.import-check.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.server.webmvc.routes[0].id=room-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/rooms/**
spring.cloud.gateway.server.webmvc.routes[1].id=member-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/members/**
spring.cloud.gateway.server.webmvc.routes[2].id=reservation-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/reservations/**
